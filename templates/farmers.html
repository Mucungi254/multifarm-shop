{% extends "base.html" %}
{% block title %}Manage Farmers{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3"><i class="fas fa-users me-2 text-primary"></i>Manage Farmers</h1>
    <div>
        <a href="{{ url_for('import_farmers') }}" class="btn btn-info">
            <i class="fas fa-file-import me-1"></i>Import Excel
        </a>
    </div>
</div>

<form method="POST" class="row g-3 mb-4 align-items-end">
    <div class="col-md-3">
        <label class="form-label">Member No</label>
        <input type="text" name="member_no" class="form-control" placeholder="e.g. 001" required>
    </div>
    <div class="col-md-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Farmer name">
    </div>
    <div class="col-md-2">
        <label class="form-label">Rider</label>
        <select name="rider" class="form-select">
            <option value="B">B</option>
            <option value="J">J</option>
        </select>
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-success w-100"><i class="fas fa-plus me-1"></i>Add Farmer</button>
    </div>
</form>

<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead>
            <tr><th>Member No</th><th>Name</th><th>Rider</th><th>Action</th></tr>
        </thead>
        <tbody>
            {% for f in farmers %}
            <tr>
                <td>{{ f.member_no }}</td>
                <td>{{ f.name or '' }}</td>
                <td>{{ f.rider }}</td>
                <td>
                    <form method="POST" action="{{ url_for('delete_farmer', farmer_id=f.id) }}" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete this farmer?')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
